mqtt:
  select:
    - name: LabOS Automation Mode
      unique_id: labos_automation_mode
      command_topic: lab/automation/mode
      state_topic: lab/automation/mode_state
      options: [manual, monitor, auto]
      retain: true
  sensor:
    - name: Lab Vision Status
      unique_id: lab_vision_status
      state_topic: lab/vision/status
      value_template: "{{ value_json.status if value_json is mapping and 'status' in value_json else value }}"
    - name: Lab Vision Source Status
      unique_id: lab_vision_source_status
      state_topic: lab/vision/source_status
    - name: Lab Automation Status
      unique_id: lab_automation_status
      state_topic: lab/automation/status
    - name: Lab Automation Priority State
      unique_id: lab_automation_priority_state
      state_topic: lab/automation/priority_state
    - name: Lab Automation Vision Health
      unique_id: lab_automation_vision_health
      state_topic: lab/automation/vision_health
    - name: Lab Automation Warning
      unique_id: lab_automation_warning
      state_topic: lab/automation/warning
    - name: Lab People Count
      unique_id: lab_vision_people_count
      state_topic: lab/vision/people_count
      value_template: "{{ value_json.stable_count }}"
  switch:
    - name: Lab Relay 1
      unique_id: lab_relay_1
      command_topic: lab/control/relay1/set
      state_topic: lab/control/relay1/state
    - name: Lab Relay 2
      unique_id: lab_relay_2
      command_topic: lab/control/relay2/set
      state_topic: lab/control/relay2/state
    - name: Lab Relay 3
      unique_id: lab_relay_3
      command_topic: lab/control/relay3/set
      state_topic: lab/control/relay3/state
    - name: Lab Relay 4
      unique_id: lab_relay_4
      command_topic: lab/control/relay4/set
      state_topic: lab/control/relay4/state
    - name: Lab Relay 5
      unique_id: lab_relay_5
      command_topic: lab/control/relay5/set
      state_topic: lab/control/relay5/state
    - name: Lab Relay 6
      unique_id: lab_relay_6
      command_topic: lab/control/relay6/set
      state_topic: lab/control/relay6/state
    - name: Lab Relay 7
      unique_id: lab_relay_7
      command_topic: lab/control/relay7/set
      state_topic: lab/control/relay7/state
    - name: Lab Relay 8
      unique_id: lab_relay_8
      command_topic: lab/control/relay8/set
      state_topic: lab/control/relay8/state
    - name: Lab Relay 9
      unique_id: lab_relay_9
      command_topic: lab/control/relay9/set
      state_topic: lab/control/relay9/state
    - name: Lab Relay 10
      unique_id: lab_relay_10
      command_topic: lab/control/relay10/set
      state_topic: lab/control/relay10/state
