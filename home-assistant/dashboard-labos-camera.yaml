# Lovelace dashboard snippet for the LabOS camera and automation status.
#
# Add these cards near the top of the LabOS dashboard after the Generic Camera
# entity `camera.labos_live_camera` exists.
- type: picture-entity
  entity: camera.labos_live_camera
  name: LabOS Live Camera
  camera_view: live
  show_name: true
  show_state: false

- type: entities
  title: LabOS Automation
  entities:
    - entity: select.labos_automation_controller_labos_automation_mode
      name: Automation Mode
    - entity: sensor.labos_automation_controller_labos_people_count
      name: People Count
    - entity: sensor.labos_automation_controller_labos_automation_vision_health
      name: Vision Health
    - entity: sensor.labos_automation_controller_labos_automation_warning
      name: Warning
    - entity: sensor.labos_automation_controller_labos_automation_status
      name: Automation Status
    - entity: sensor.labos_automation_controller_labos_last_action
      name: Last Action / Decision

- type: entities
  title: LabOS Loads
  entities:
    - entity: switch.labos_final_lab_relay_node_01_4_lights
      name: Light A4
    - entity: switch.labos_final_lab_relay_node_02_2_lights
      name: Light B2
    - entity: switch.labos_final_lab_relay_node_03_fan_1
      name: Fan 1
    - entity: switch.labos_final_lab_relay_node_04_fan_2
      name: Fan 2
    - entity: switch.labos_final_lab_relay_node_05_fan_3
      name: Fan 3
    - entity: switch.labos_final_lab_relay_node_06_fan_4
      name: Fan 4
